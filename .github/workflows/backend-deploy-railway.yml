name: Backend Deploy (Railway)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy-railway.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    defaults:
      run:
        working-directory: backend
    concurrency:
      group: railway-backend-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway token secret
        run: test -n "$RAILWAY_TOKEN"

      - name: Verify Railway authentication
        run: railway whoami

      - name: Link Railway service
        run: railway link --project 2234c66a-596b-43e2-9b14-f09aa0281eba --environment a43889c0-ce5c-43d6-9ab5-53ec7428495e --service 01ab53f3-4c3c-4c0e-8733-6ee949141da2

      - name: Deploy backend to Railway production
        run: railway up --ci
